<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Jakarta Fair Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">Jakarta Fair Shop</a>
    </nav>
    <div class="container" style="max-width: 400px; margin-top: 3rem;">
        <div class="card">
            <h2 class="section-title" style="text-align: center;">Register</h2>
            <p class="section-subtitle" style="text-align: center;">Create your new account</p>
            <form id="register-form" onsubmit="handleRegister(event)">
                <div style="margin-bottom: 1rem;">
                    <label style="font-weight: 600; color: var(--text-main);">Username</label>
                    <input type="text" id="reg-username" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); margin-top: 0.5rem; outline: none;">
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="font-weight: 600; color: var(--text-main);">Password</label>
                    <input type="password" id="reg-password" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); margin-top: 0.5rem; outline: none;">
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="font-weight: 600; color: var(--text-main);">I am a</label>
                    <select id="reg-role" onchange="toggleNameLabel()" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); margin-top: 0.5rem; outline: none; background: white;">
                        <option value="buyer">Buyer</option>
                        <option value="seller">Seller</option>
                    </select>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label id="reg-name-label" style="font-weight: 600; color: var(--text-main);">Full Name</label>
                    <input type="text" id="reg-name" required placeholder="e.g. Budi Santoso" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); margin-top: 0.5rem; outline: none;">
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 0;">Sign Up</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Already have an account? <a href="login.html" style="color: var(--primary-color); font-weight: bold; text-decoration: none;">Login</a>
            </p>
        </div>
    </div>
    <div id="toast" class="toast">Message here</div>
    <script src="app.js"></script>
    <script>
        function toggleNameLabel() {
            const role = document.getElementById('reg-role').value;
            const label = document.getElementById('reg-name-label');
            const input = document.getElementById('reg-name');
            if(role === 'seller') {
                label.textContent = 'Stand Name';
                input.placeholder = 'e.g. Kedai Kopi Enak';
            } else {
                label.textContent = 'Full Name';
                input.placeholder = 'e.g. Budi Santoso';
            }
        }
    </script>
</body>
</html>
