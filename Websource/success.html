<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - Jakarta Fair Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="success-card card">
        <div class="success-icon">✓</div>
        <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Order Confirmed</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2rem;">
            Your treasures from the Jakarta Fair<br>are ready to be claimed.
        </p>

        <div style="border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 2rem;">
            <div style="display: flex; justify-content: space-between; text-align: left; margin-bottom: 1rem;">
                <div>
                    <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">PICKUP LOCATION</div>
                    <div style="color: var(--primary-color); font-size: 1.2rem; font-weight: 700;" id="success-stand">Hall A - Stall #--</div>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">ORDER ID</div>
                    <div style="font-weight: 700;">#JF-<span id="success-id">...</span></div>
                </div>
            </div>

            <div class="qr-placeholder">
                <div style="text-align: center;">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=JakartaFairOrder" alt="QR Code" style="margin-bottom: 1rem;">
                    <p style="font-size: 0.9rem; color: var(--text-muted);">Present this code at the stall</p>
                </div>
            </div>

            <button class="btn-primary" style="margin-top: 0; background: #0056b3;" onclick="window.location.href='index.html'">
                Continue Shopping
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const orderData = JSON.parse(localStorage.getItem('jf_current_order') || '{}');
            if(orderData.standName) {
                document.getElementById('success-stand').textContent = orderData.standName;
            }
            document.getElementById('success-id').textContent = Math.floor(10000 + Math.random() * 90000);
            
            // Clear cart
            localStorage.removeItem('jf_current_order');
        });
    </script>
</body>
</html>
