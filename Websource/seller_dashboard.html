<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - Jakarta Fair Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="seller_dashboard.html" class="logo">Seller Portal</a>
        <div class="nav-links">
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>
    <div class="container" style="max-width: 1000px; margin-top: 2rem;">
        <div id="seller-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h2 class="section-title">Welcome, <span id="seller-name">Seller</span></h2>
                <p id="seller-status" style="color: var(--text-muted);">Verification Status: Checking...</p>
            </div>
        </div>

        <div class="checkout-container">
            <!-- Menu Management (Pasang Menu & Harga) -->
            <div class="card" style="align-self: start;">
                <h3 style="margin-bottom: 1rem; color: var(--primary-color);">Pasang Menu & Harga</h3>
                <form id="add-product-form" onsubmit="handleAddProduct(event)">
                    <div style="margin-bottom: 1rem;">
                        <label style="font-size: 0.9rem; font-weight: 600;">Product Name</label>
                        <input type="text" id="prod-name" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); margin-top: 0.3rem;">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label style="font-size: 0.9rem; font-weight: 600;">Price (Rp)</label>
                        <input type="number" id="prod-price" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); margin-top: 0.3rem;">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label style="font-size: 0.9rem; font-weight: 600;">Stock Quantity</label>
                        <input type="number" id="prod-stock" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); margin-top: 0.3rem;">
                    </div>
                    <button type="submit" class="btn-primary" style="margin-top: 0;">Add Product</button>
                </form>
            </div>

            <!-- Orders Management (Memproses Pesanan) -->
            <div class="card">
                <h3 style="margin-bottom: 1rem;">Incoming Orders</h3>
                <div id="seller-orders">
                    <p>Loading orders...</p>
                </div>
            </div>
        </div>
    </div>
    <div id="toast" class="toast">Message here</div>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initSellerDashboard);
    </script>
</body>
</html>
